<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0051d5", "on-primary": "#ffffff", "surface": "#f8f9fa",
                        "on-surface": "#191c1d", "on-surface-variant": "#3d4947",
                        "surface-container-low": "#f3f4f5", "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bcc9c6", "tertiary-container": "#008376"
                    },
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="text-on-surface antialiased pb-24">
<header class="bg-teal-700 rounded-b-[2.5rem] pt-6 pb-8 px-6 shadow-lg text-white">
<div class="flex justify-between items-center mb-6">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/20 bg-slate-200">
<img id="worker-avatar" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=W"/>
</div>
<div>
<p class="text-teal-100/80 text-xs font-semibold uppercase tracking-wider mb-0.5">Carepartner</p>
<h1 id="worker-name" class="font-manrope text-lg font-bold">Chào buổi sáng!</h1>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
<div class="flex gap-3">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full bg-white text-slate-900 pl-11 pr-4 py-3.5 rounded-2xl border-none ring-0 focus:ring-2 focus:ring-teal-400 font-medium" placeholder="Tìm kiếm công việc..." type="text"/>
</div>
<button class="bg-white/10 p-3.5 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined">tune</span>
</button>
</div>
</header>
<main class="mt-8 px-6 space-y-4">
<div class="flex justify-between items-center mb-2">
<h2 class="font-manrope text-xl font-extrabold text-on-surface tracking-tight">Việc làm mới nhất</h2>
<span class="text-primary font-bold text-sm">Xem tất cả</span>
</div>
<div id="job-feed" class="space-y-4">
    <div class="text-center py-10 italic text-slate-400">Đang tải việc làm...</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 w-full bg-white/70 backdrop-blur-xl flex justify-around items-center px-4 pb-6 pt-2 z-50 rounded-t-3xl shadow-lg">
<a class="flex flex-col items-center justify-center bg-teal-50 dark:bg-teal-900/30 text-teal-700 dark:text-teal-300 rounded-2xl px-6 py-2 transition-all duration-200 ease-out active:scale-95" href="bang_tin_viec_lam.html">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="text-[12px] font-semibold mt-1">Tìm việc</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-6 py-2" href="#">
<span class="material-symbols-outlined text-2xl">assignment</span>
<span class="text-[12px] font-semibold mt-1">Việc của tôi</span>
</a>
<a onclick="localStorage.clear(); location.href='../authentication_screen/dang_nhap.html'" class="flex flex-col items-center justify-center text-slate-500 px-6 py-2 cursor-pointer" href="#">
<span class="material-symbols-outlined text-2xl">logout</span>
<span class="text-[12px] font-semibold mt-1">Thoát</span>
</a>
</nav>
<script>
    const API_BASE = "http://127.0.0.1:8000/api";
    const token = localStorage.getItem('token');
    if (!token) window.location.href = "../authentication_screen/code.html";

    async function init() {
        try {
            const profResp = await fetch(API_BASE + "/profile/", { headers: { 'Authorization': 'Bearer ' + token } });
            const prof = await profResp.json();
            document.getElementById('worker-name').innerText = "Chào, " + (prof.first_name || prof.username) + "!";
            document.getElementById('worker-avatar').src = `https://ui-avatars.com/api/?name=${prof.username}&background=random`;

            const taskResp = await fetch(API_BASE + "/tasks/", { headers: { 'Authorization': 'Bearer ' + token } });
            const tasks = await taskResp.json();
            const container = document.getElementById('job-feed');
            if (tasks.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-2xl p-10 text-center text-slate-400 italic border border-dashed">Chưa có việc làm nào.</div>`;
            } else {
                container.innerHTML = tasks.map(t => `
                    <article class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 relative group transition-transform">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-purple-50 text-purple-600 px-3 py-1 rounded-lg text-xs font-black tracking-tighter flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                                MỚI
                            </span>
                            <span class="text-teal-600 font-manrope text-2xl font-black tracking-tighter">${new Intl.NumberFormat('vi-VN').format(t.price)}đ</span>
                        </div>
                        <h3 class="font-manrope text-xl font-extrabold text-slate-800 leading-tight mb-4">${t.title}</h3>
                        <div class="space-y-3 text-sm text-on-surface-variant">
                            <p>⏰ ${new Date(t.scheduled_time).toLocaleString('vi-VN')}</p>
                            <p>📍 ${t.location}</p>
                        </div>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400">Phụ huynh: ${t.parent_name || 'Hệ thống'}</span>
                            <button onclick="apply(${t.id})" class="bg-primary text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700">Ứng tuyển</button>
                        </div>
                    </article>
                `).join('');
            }
        } catch (e) { console.error(e); }
    }
    async function apply(id) {
        if (!confirm("Ứng tuyển việc này?")) return;
        try {
            const r = await fetch(`${API_BASE}/worker/tasks/${id}/apply/`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            const d = await r.json();
            alert(d.message || d.error);
        } catch (e) { alert("Lỗi kết nối."); }
    }
    init();
</script>
</body></html>
