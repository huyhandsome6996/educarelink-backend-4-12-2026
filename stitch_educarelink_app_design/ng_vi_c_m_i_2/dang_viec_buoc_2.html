<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng việc mới - Educarelink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#ffdad6",
                    "outline": "#6d7a77",
                    "inverse-surface": "#2e3132",
                    "primary": "#0051d5",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "on-secondary-fixed": "#2a1800",
                    "surface-container-high": "#e7e8e9",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#ffddb6",
                    "on-primary-fixed-variant": "#003ea8",
                    "surface-container-low": "#f3f4f5",
                    "tertiary-fixed": "#71f8e4",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#bcc9c6",
                    "tertiary": "#00685d",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-tertiary-container": "#f4fffb",
                    "surface-tint": "#0053db",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f8f9fa",
                    "secondary-container": "#feb246",
                    "on-primary-fixed": "#00174b",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed": "#dbe1ff",
                    "inverse-on-surface": "#f0f1f2",
                    "inverse-primary": "#b4c5ff",
                    "secondary-fixed-dim": "#ffb95a",
                    "tertiary-fixed-dim": "#4fdbc8",
                    "on-tertiary-fixed-variant": "#005048",
                    "on-secondary-fixed-variant": "#643f00",
                    "secondary": "#845400",
                    "surface": "#f8f9fa",
                    "on-surface-variant": "#3d4947",
                    "on-secondary": "#ffffff",
                    "background": "#f8f9fa",
                    "on-surface": "#191c1d",
                    "on-primary-container": "#fefcff",
                    "tertiary-container": "#008376",
                    "on-background": "#191c1d",
                    "surface-dim": "#d9dadb",
                    "surface-container": "#edeeef",
                    "on-tertiary-fixed": "#00201c",
                    "primary-container": "#316bf3",
                    "on-secondary-container": "#6f4600",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="scale-95 transition-transform duration-200 text-teal-600 dark:text-teal-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-teal-600 dark:text-teal-400">Đăng việc mới</h1>
</div>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 px-6 space-y-10 max-w-md mx-auto">
<!-- Service Selection -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-xl text-on-surface">Bạn cần dịch vụ gì?</h2>
<div class="grid grid-cols-3 gap-3">
<!-- Active Service -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-teal-600 text-white shadow-lg transition-all scale-[0.98]">
<div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<span class="text-sm font-semibold">Gia sư</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-lowest text-on-surface shadow-sm border border-outline-variant/15 hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 bg-secondary-container/20 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-secondary" data-icon="directions_car">directions_car</span>
</div>
<span class="text-sm font-medium">Đón trẻ</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-lowest text-on-surface shadow-sm border border-outline-variant/15 hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 bg-tertiary-container/10 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-tertiary" data-icon="cleaning_services">cleaning_services</span>
</div>
<span class="text-sm font-medium">Dọn dẹp</span>
</button>
</div>
</section>
<!-- Task Details Form -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<h2 class="font-headline font-bold text-xl text-on-surface">Thông tin chi tiết</h2>
<span class="text-xs font-bold px-2 py-1 bg-tertiary-container/10 text-tertiary rounded-full uppercase tracking-wider">Cần thiết</span>
</div>
<div class="space-y-5">
<!-- Title Input -->
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Tiêu đề công việc</label>
<input class="w-full px-5 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50" placeholder="Ví dụ: Cần gia sư Toán lớp 5" type="text"/>
</div>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Mô tả chi tiết</label>
<textarea class="w-full px-5 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50 resize-none" placeholder="Mô tả các yêu cầu cụ thể đối với người làm..." rows="4"></textarea>
</div>
<!-- Address Input -->
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Địa chỉ</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="location_on">location_on</span>
<input class="w-full pl-12 pr-5 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50" placeholder="Nhập địa chỉ làm việc" type="text"/>
</div>
</div>
<!-- Date & Time Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Ngày làm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="calendar_today">calendar_today</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50" placeholder="Chọn ngày" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Giờ bắt đầu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="schedule">schedule</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50" placeholder="08:00 AM" type="text"/>
</div>
</div>
</div>
<!-- Salary Input -->
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface-variant ml-1">Mức lương đề xuất</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-lowest border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none text-on-surface placeholder:text-outline/50 font-bold text-lg" placeholder="200.000" type="number"/>
<span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-on-surface-variant">VNĐ</span>
</div>
<p class="text-xs text-on-surface-variant/70 italic ml-1">Gợi ý: Mức lương trung bình cho Gia sư là 150k - 300k/giờ</p>
</div>
</div>
</section>
<!-- Illustration / Contextual Image -->
<div class="rounded-xl overflow-hidden h-40 shadow-inner bg-slate-200">
<img class="w-full h-full object-cover mix-blend-multiply opacity-80" data-alt="Modern minimalist home office with books and stationery in soft natural sunlight, peaceful educational environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3s3DQUHAWrNRWNqfqd5YBA_0RYXEFTAtusneozV3-h4KaP8bZanHZC4sm0BToZ62tPQV_WE37WUmVGIuGFrI349FTb7x4WGXJQgXNAd7B4vXCdHGkbsRVgG0W_B00icMEjmhwp9V3pr_oSKQSjuVKph14eUI21s-M3cwOfcc-qLa6fpjrt6rPdLvi9BSCGsUzDq6ZgXey0M-STcE8907TEo_84MHKa828pTrK_5PfcbupakyEiwI6GQUHfEnrIBmxf5vBUUf8EA"/>
</div>
</main>
<!-- Bottom Action Button -->
<nav class="fixed bottom-0 left-0 w-full px-6 py-4 bg-white dark:bg-slate-900 flex justify-center shadow-[0_-20px_40px_rgba(13,148,136,0.06)] rounded-t-3xl z-50">
<button class="w-full py-4 bg-teal-600 dark:bg-teal-500 text-white rounded-2xl flex justify-center items-center font-bold text-base hover:bg-teal-700 dark:hover:bg-teal-400 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined mr-2" data-icon="send">send</span>
            Đăng lên cộng đồng
        </button>
</nav>
</body></html>
