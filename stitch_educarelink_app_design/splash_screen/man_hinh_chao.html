<style>
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Splash Screen Container -->
<!-- Suppression Rule: No TopAppBar or BottomNavBar as this is a focused linear splash screen -->
<main class="h-screen w-full flex flex-col items-center justify-center relative overflow-hidden bg-gradient-to-br from-blue-50 to-blue-100">
<!-- Abstract Background Textures (Editorial Empathy Aesthetic) -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed/20 blur-[120px]"></div>
</div>
<!-- Identity Cluster -->
<div class="z-10 flex flex-col items-center text-center px-6">
<!-- Logo Module -->
<div class="mb-8 relative">
<!-- Diffusion Shadow effect from Design System -->
<div class="w-24 h-24 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_20px_40px_rgba(0,81,213,0.12)] animate-pulse-soft">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">
                        shield_with_heart
                    </span>
</div>
<!-- Decorative Orbit -->
<div class="absolute -inset-4 border border-primary/10 rounded-xl animate-pulse-soft" style="animation-delay: 0.5s;"></div>
</div>
<!-- Branding -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-5xl tracking-tight text-primary">
                    Educarelink
                </h1>
<p class="font-body text-on-surface-variant text-lg font-medium tracking-wide">
                    Trợ lý gia đình, Việc làm linh hoạt
                </p>
</div>
<!-- Loading Indicator (Subtle) -->
<div class="mt-24 flex space-x-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40 animate-bounce" style="animation-delay: 0.1s;"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/60 animate-bounce" style="animation-delay: 0.2s;"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40 animate-bounce" style="animation-delay: 0.3s;"></div>
</div>
</div>
<!-- Decorative Footer Image (Editorial Layering) -->
<div class="absolute bottom-0 left-0 w-full h-[265px] overflow-hidden opacity-40">
<img alt="Community and family connection" class="w-full h-full object-cover" data-alt="Soft focus image of two people holding hands warmly, representing care and support, with natural sunlight and airy atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSpE_kKbSBYvYbXi24zgl0b272BVrLleG2kMrjz-1iDgXPkafB_1MqiOpFeEUC67P93lNuAlliNC8sv-GvE2PXyxkJ1_EOMG4nFzyEV94OQkN0c7mUXOWXZAsE8u-Bx5AWzYNQndlE-oWg-oRmZumLLEpn44fS_a7QWoYLxUF830lMi7_QNwSloOH-a28Ph4NmCybUINgY0ZBd4-s4DT0sqMneNljtSp8309s-Oq2fjZeJxhQE0iXL4a6iRZIbfd6mZUJSCLCTKg"/>

<div class="absolute inset-0 bg-gradient-to-t from-blue-100 via-transparent to-transparent"></div>
</div>
<!-- Semantic Identity Anchor (Hidden) -->
<div class="hidden" data-identity="nurturing-curator"></div>
