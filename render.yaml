services:
  - type: web
    name: educarelink-backend
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      # Keep-Alive Scheduler (tự ping mỗi 3 phút để Render free không sleep)
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_INTERVAL
        value: "3"
      - key: RENDER_URL
        value: "https://educarelink-backend.onrender.com"
      # AI Anomaly Detection (tự quét bất thường mỗi 10 phút → thông báo Admin)
      - key: ANOMALY_ENABLED
        value: "true"
      - key: ANOMALY_CHECK_INTERVAL
        value: "10"
      # Social OAuth (Google + Facebook đăng nhập cho Phụ huynh)
      # Đặt giá trị thực trên Render Dashboard → Settings → Environment Variables
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      # DATABASE_URL: Bắt buộc đặt thủ công trên Render Dashboard
      # Vào Settings → Environment → Add Environment Variable
      # Key: DATABASE_URL
      # Value: connection string từ Neon (postgresql://user:pass@ep-xxx.neon.tech/db?sslmode=require)
      # ── MoMo Payment (escrow + cash settlement) ──
      # Đăng ký đối tác tại https://business.momo.vn/ để lấy Partner Code / Access Key / Secret Key
      # Sandbox test credentials có sẵn trong docs https://developers.momo.vn/v3/vi/docs/payment/app/app-in-app/payment-link
      - key: MOMO_ENVIRONMENT
        value: "sandbox"     # chuyển sang "production" khi go-live
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_STORE_ID
        value: "EduCareLinkStore"
      - key: MOMO_RETURN_BASE_URL
        value: "https://educarelink-backend.onrender.com"
      - key: MOMO_IPN_URL
        value: "https://educarelink-backend.onrender.com/api/payments/momo-ipn/"
      - key: PAYMENT_COMMISSION_RATE
        value: "0.20"
      - key: PAYMENT_SETTLEMENT_DUE_DAYS
        value: "7"
      - key: PAYMENT_SCHEDULER_ENABLED
        value: "true"
