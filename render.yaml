services:
  - type: web
    name: educarelink-backend
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.5"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DEBUG
        value: "False"
      - key: GEMINI_API_KEY
        sync: false
      # DATABASE_URL: Bắt buộc đặt thủ công trên Render Dashboard
      # Vào Settings → Environment → Add Environment Variable
      # Key: DATABASE_URL
      # Value: connection string từ Neon (postgresql://user:pass@ep-xxx.neon.tech/db?sslmode=require)
