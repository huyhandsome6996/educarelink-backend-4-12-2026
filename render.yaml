services:
  - type: web
    name: educarelink-backend
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      # Keep-Alive Scheduler (tự ping mỗi 3 phút để Render free không sleep)
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_INTERVAL
        value: "3"
      - key: RENDER_URL
        value: "https://educarelink-backend.onrender.com"
      # AI Anomaly Detection (tự quét bất thường mỗi 10 phút → thông báo Admin)
      - key: ANOMALY_ENABLED
        value: "true"
      - key: ANOMALY_CHECK_INTERVAL
        value: "10"
      # DATABASE_URL: Bắt buộc đặt thủ công trên Render Dashboard
      # Vào Settings → Environment → Add Environment Variable
      # Key: DATABASE_URL
      # Value: connection string từ Neon (postgresql://user:pass@ep-xxx.neon.tech/db?sslmode=require)
