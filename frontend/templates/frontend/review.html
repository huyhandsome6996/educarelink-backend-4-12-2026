<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#2e3132",
                        "inverse-primary": "#b4c5ff",
                        "background": "#f8f9fa",
                        "surface-container-low": "#f3f4f5",
                        "surface": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-container": "#008376",
                        "on-secondary-fixed-variant": "#643f00",
                        "secondary-container": "#feb246",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ffddb6",
                        "on-secondary-container": "#6f4600",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "on-primary-container": "#fefcff",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary": "#00685d",
                        "primary": "#0051d5",
                        "surface-variant": "#e1e3e4",
                        "tertiary-fixed": "#71f8e4",
                        "on-tertiary-fixed-variant": "#005048",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#316bf3",
                        "on-surface-variant": "#3d4947",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary-container": "#f4fffb",
                        "on-surface": "#191c1d",
                        "surface-tint": "#0053db",
                        "surface-dim": "#d9dadb",
                        "on-background": "#191c1d",
                        "primary-fixed": "#dbe1ff",
                        "outline-variant": "#bcc9c6",
                        "secondary-fixed-dim": "#ffb95a",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-bright": "#f8f9fa",
                        "error": "#ba1a1a",
                        "surface-container": "#edeeef",
                        "on-primary-fixed": "#00174b",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#00201c",
                        "on-secondary-fixed": "#2a1800",
                        "outline": "#6d7a77",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary": "#845400",
                        "tertiary-fixed-dim": "#4fdbc8"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl transition-colors w-full">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button onclick="location.href='{% url 'frontend:parent_tasks' %}'" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-on-surface font-headline">Đánh giá Carepartner</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-6 pt-8 pb-32 flex flex-col items-center text-center max-w-lg mx-auto w-full">
<!-- Carepartner Summary Section -->
<section class="mb-10 w-full flex flex-col items-center" id="worker-summary">
    <!-- Will be filled by JS -->
    <div class="animate-pulse">Đang tải thông tin...</div>
</section>
<!-- Rating Section -->
<section class="mb-10 w-full bg-surface-container-lowest p-8 rounded-xl shadow-sm border border-outline-variant/10">
<p class="text-lg font-bold text-on-surface mb-6">Bạn thấy trải nghiệm này thế nào?</p>
<div class="flex justify-center gap-3" id="star-rating">
<button data-val="1" class="star-btn active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary-container" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button data-val="2" class="star-btn active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary-container" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button data-val="3" class="star-btn active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary-container" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button data-val="4" class="star-btn active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary-container" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button data-val="5" class="star-btn active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary-container" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
</div>
</section>
<!-- Review Input Section -->
<section class="w-full text-left">
<label class="block text-sm font-bold text-on-surface mb-3 px-1" for="review">Để lại nhận xét của bạn</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-0 rounded-xl p-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all resize-none" id="comment" placeholder="Chia sẻ trải nghiệm của bạn (thái độ, kỹ năng, sự nhiệt tình...)" rows="6"></textarea>
</div>
</section>
</main>
<!-- Bottom Action Shell -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md flex flex-col items-center">
<button id="submit-review" class="w-full max-w-lg bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all duration-200 text-base tracking-wide flex items-center justify-center gap-2">
            Gửi đánh giá
            <span class="material-symbols-outlined text-xl" data-icon="send">send</span>
</button>
</footer>
<script>
    const API_BASE = "/api";
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('task_id');

    if (!token) window.location.href = "{% url 'frontend:login' %}";
    if (!taskId) window.location.href = "{% url 'frontend:parent_tasks' %}";

    let rating = 5;
    const starBtns = document.querySelectorAll('.star-btn');
    starBtns.forEach(btn => {
        btn.onclick = () => {
            rating = parseInt(btn.dataset.val);
            updateStars();
        };
    });

    function updateStars() {
        starBtns.forEach(btn => {
            const val = parseInt(btn.dataset.val);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (val <= rating) {
                icon.classList.add('text-secondary-container');
                icon.classList.remove('text-outline-variant/40');
                icon.style.fontVariationSettings = "'FILL' 1";
            } else {
                icon.classList.remove('text-secondary-container');
                icon.classList.add('text-outline-variant/40');
                icon.style.fontVariationSettings = "'FILL' 0";
            }
        });
    }

    async function init() {
        try {
            const tasksResp = await fetch(API_BASE + "/parent/my-tasks/", { headers: { 'Authorization': 'Bearer ' + token } });
            const tasks = await tasksResp.json();
            const task = tasks.find(t => t.id == taskId);
            if (task) {
                document.getElementById('worker-summary').innerHTML = `
                    <div class="relative mb-6">
                        <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-lg">
                            <img alt="Worker" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=${task.worker_username || 'Worker'}&background=random">
                        </div>
                    </div>
                    <h2 class="text-2xl font-extrabold text-on-surface mb-2">${task.worker_username || 'Carepartner'}</h2>
                    <div class="inline-flex items-center px-4 py-1.5 bg-primary-container/10 rounded-full">
                        <span class="text-xs font-bold text-primary mr-2 uppercase tracking-wider">Đã hoàn thành</span>
                        <span class="text-sm font-medium text-on-surface-variant">${task.title}</span>
                    </div>
                `;
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('submit-review').onclick = async () => {
        const comment = document.getElementById('comment').value;
        try {
            const resp = await fetch(API_BASE + "/parent/review/", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    task: taskId,
                    rating: rating,
                    comment: comment
                })
            });
            if (resp.ok) {
                alert("Cảm ơn bạn đã đánh giá!");
                window.location.href = "{% url 'frontend:parent_tasks' %}";
            } else {
                const err = await resp.json();
                alert("Lỗi: " + JSON.stringify(err));
            }
        } catch (e) { alert("Lỗi kết nối."); }
    };

    updateStars();
    init();
</script>
</body></html>
