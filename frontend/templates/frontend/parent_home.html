<!DOCTYPE html>
<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Educarelink - Trang chủ Phụ huynh</title>
<!-- Premium Fonts: Outfit for Display, Plus Jakarta Sans for Body -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
                400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                800: '#9a3412', 900: '#7c2d12',
              },
              primary: '#F26522', // Warm peach/orange
              surface: '#FFFBF8', // Warm cream
              'surface-soft': '#FFF4EB',
            },
            fontFamily: {
              display: ['Outfit', 'sans-serif'],
              body: ['Plus Jakarta Sans', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 20px 40px -15px rgba(242, 101, 34, 0.1)',
              'glow': '0 0 20px rgba(242, 101, 34, 0.3)',
            }
          },
        }
      }
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFFBF8; }
    h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
    .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
    }
    /* Hide scrollbar */
    ::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="text-slate-800 min-h-screen pb-32 max-w-lg mx-auto relative shadow-2xl">
<!-- Abstract Background Warmth -->
<div class="fixed top-[-10%] left-[-20%] w-[70%] h-[40%] bg-brand-200/40 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed top-[20%] right-[-20%] w-[60%] h-[50%] bg-rose-200/30 rounded-full blur-[120px] pointer-events-none"></div>

<header class="sticky top-0 w-full z-50 glass-nav h-20 flex justify-between items-center px-6 border-b border-brand-100/50">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl overflow-hidden bg-brand-100 p-0.5 shadow-sm">
            <img id="user-avatar" alt="Avatar" class="w-full h-full object-cover rounded-xl" src="https://ui-avatars.com/api/?name=User"/>
        </div>
        <div>
            <p class="text-[11px] uppercase tracking-widest text-slate-400 font-bold mb-0.5">Chào ngày mới,</p>
            <p id="user-name" class="font-display font-extrabold text-xl text-slate-800 leading-none">Ba Mẹ ơi</p>
        </div>
    </div>
    <button class="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-600 hover:text-primary transition-colors border border-slate-100">
        <span class="material-symbols-rounded">notifications</span>
    </button>
</header>

<main class="px-6 mt-8 space-y-10 relative z-10">
    <!-- Premium Hero CTA -->
    <section>
        <button onclick="location.href='{% url 'frontend:task_create_1' %}'" class="w-full relative overflow-hidden bg-gradient-to-br from-primary to-brand-600 p-8 rounded-[2rem] text-left active:scale-[0.97] transition-all duration-300 shadow-soft group">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/20 rounded-full blur-2xl group-hover:scale-125 transition-transform duration-700"></div>
            <div class="absolute -bottom-8 -left-8 w-32 h-32 bg-brand-400/40 rounded-full blur-xl"></div>
            
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <span class="material-symbols-rounded text-white bg-white/20 p-2.5 rounded-2xl backdrop-blur-sm">favorite</span>
                    <span class="material-symbols-rounded text-white/50 text-3xl group-hover:translate-x-2 transition-transform">arrow_forward</span>
                </div>
                <h1 class="text-white font-display font-black text-3xl tracking-tight mb-2">Tìm Người Phụ Giúp</h1>
                <p class="text-brand-50 text-sm font-medium leading-relaxed max-w-[80%]">Tạo lịch tìm Carepartner tận tâm cho gia đình nhỏ của bạn chỉ trong 3 phút.</p>
            </div>
        </button>
    </section>

    <!-- Task List -->
    <section>
        <div class="flex justify-between items-end mb-6">
            <h2 class="font-display font-extrabold text-2xl text-slate-800 tracking-tight">Việc cần làm</h2>
            <a class="text-primary text-sm font-bold hover:underline mb-1" href="{% url 'frontend:parent_tasks' %}">Xem tất cả</a>
        </div>
        <div id="task-list" class="space-y-5">
            <!-- Skeleton Loading -->
            <div class="animate-pulse bg-white p-6 rounded-[1.5rem] shadow-sm border border-slate-100 flex gap-4">
                <div class="w-14 h-14 bg-slate-100 rounded-xl"></div>
                <div class="flex-1 space-y-3 py-1">
                    <div class="h-4 bg-slate-100 rounded w-3/4"></div>
                    <div class="h-3 bg-slate-50 rounded w-1/2"></div>
                </div>
            </div>
        </div>
    </section>
</main>
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md flex justify-around items-center px-2 py-2 glass-nav shadow-[0_10px_40px_rgba(0,0,0,0.05)] z-50 rounded-full">
    <a class="flex flex-col items-center justify-center bg-brand-50 text-primary rounded-full w-16 h-14 transition-transform active:scale-95" href="{% url 'frontend:parent_home' %}">
        <span class="material-symbols-rounded text-2xl">home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-800 rounded-full w-16 h-14 transition-all" href="{% url 'frontend:parent_tasks' %}">
        <span class="material-symbols-rounded text-2xl">assignment</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-800 rounded-full w-16 h-14 transition-all" href="#">
        <span class="material-symbols-rounded text-2xl">chat</span>
    </a>
    <a onclick="localStorage.clear(); location.href='{% url 'frontend:login' %}'" class="flex flex-col items-center justify-center text-slate-400 hover:text-rose-500 rounded-full w-16 h-14 transition-all cursor-pointer" href="#">
        <span class="material-symbols-rounded text-2xl">logout</span>
    </a>
</nav>
<script>
    const API_BASE = "/api";
    const token = localStorage.getItem('token');
    if (!token) window.location.href = "{% url 'frontend:login' %}";

    async function init() {
        try {
            const profResp = await fetch(API_BASE + "/profile/", { headers: { 'Authorization': 'Bearer ' + token } });
            const prof = await profResp.json();
            document.getElementById('user-name').innerText = prof.first_name || prof.username;
            if(prof.selfie_photo) {
                document.getElementById('user-avatar').src = prof.selfie_photo;
            } else {
                document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${prof.username}&background=FFF4EB&color=F26522`;
            }

            const taskResp = await fetch(API_BASE + "/parent/my-tasks/", { headers: { 'Authorization': 'Bearer ' + token } });
            const tasks = await taskResp.json();
            const container = document.getElementById('task-list');
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-[2rem] border border-dashed border-slate-200 text-center shadow-sm flex flex-col items-center">
                        <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center mb-4">
                            <span class="material-symbols-rounded text-primary text-3xl">child_care</span>
                        </div>
                        <p class="text-slate-500 font-medium">Bạn chưa đăng công việc nào.</p>
                        <p class="text-slate-400 text-sm mt-1">Hãy đăng việc ngay để tìm người hỗ trợ nhé!</p>
                    </div>`;
            } else {
                container.innerHTML = tasks.slice(0, 5).map(t => {
                    let statusColor = "bg-brand-50 text-primary";
                    let statusIcon = "schedule";
                    let statusText = "Chờ Carepartner";
                    
                    if (t.status === 'open' && t.applications_count > 0) {
                        statusColor = "bg-rose-50 text-rose-600";
                        statusIcon = "group";
                        statusText = `Có ${t.applications_count} ứng viên`;
                    } else if (t.status === 'assigned') {
                        statusColor = "bg-emerald-50 text-emerald-600";
                        statusIcon = "check_circle";
                        statusText = "Đã có người làm";
                    } else if (t.status === 'completed') {
                        statusColor = "bg-slate-50 text-slate-500";
                        statusIcon = "done_all";
                        statusText = "Hoàn thành";
                    }
                    
                    return `
                    <a href="{% url 'frontend:parent_tasks' %}?task_id=${t.id}" class="block bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div class="inline-flex items-center gap-1.5 ${statusColor} px-3 py-1.5 rounded-xl text-xs font-bold">
                                <span class="material-symbols-rounded text-[16px]">${statusIcon}</span>
                                ${statusText}
                            </div>
                            <div class="text-slate-800 font-display font-bold text-lg">${new Intl.NumberFormat('vi-VN').format(t.price)}đ</div>
                        </div>
                        <h3 class="text-lg font-display font-extrabold text-slate-800 mb-4 line-clamp-2 leading-tight">${t.title}</h3>
                        <div class="flex items-center gap-4 text-slate-500 text-sm">
                            <div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-xl flex-1">
                                <span class="material-symbols-rounded text-[18px] text-slate-400">calendar_month</span>
                                <span class="truncate">${new Date(t.scheduled_time).toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'})}</span>
                            </div>
                            <div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-xl flex-1">
                                <span class="material-symbols-rounded text-[18px] text-slate-400">location_on</span>
                                <span class="truncate">${t.location.split(',')[0]}</span>
                            </div>
                        </div>
                    </a>
                `}).join('');
            }
        } catch (e) { console.error(e); }
    }
    init();
</script>
</body></html>
