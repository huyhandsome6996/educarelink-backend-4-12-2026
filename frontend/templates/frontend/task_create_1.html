<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "on-secondary": "#ffffff",
                      "tertiary-container": "#008376",
                      "on-primary-fixed": "#00174b",
                      "error-container": "#ffdad6",
                      "surface-dim": "#d9dadb",
                      "primary-fixed-dim": "#b4c5ff",
                      "on-surface-variant": "#3d4947",
                      "on-error-container": "#93000a",
                      "surface": "#f8f9fa",

                      "surface-container-highest": "#e1e3e4",
                      "on-secondary-fixed-variant": "#643f00",
                      "on-secondary-fixed": "#2a1800",
                      "outline-variant": "#bcc9c6",

                      "tertiary-fixed": "#71f8e4",
                      "on-surface": "#191c1d",
                      "primary": "#0051d5",
                      "inverse-on-surface": "#f0f1f2",
                      "inverse-surface": "#2e3132",
                      "secondary-container": "#feb246",
                      "on-tertiary-fixed": "#00201c",
                      "tertiary": "#00685d",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_20px_40px_rgba(13,148,136,0.06)] rounded-b-[2rem]">
<button onclick="location.href='{% url 'frontend:parent_home' %}'" class="p-2 text-teal-600 dark:text-teal-400 hover:bg-teal-50 dark:hover:bg-teal-900/30 transition-colors scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-teal-900 dark:text-teal-50">Đăng việc mới</h1>
<button class="p-2 text-teal-600 dark:text-teal-400 hover:bg-teal-50 dark:hover:bg-teal-900/30 transition-colors scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Category Selector Section -->
<section class="mb-10">
<h2 class="text-label-md font-bold text-on-surface-variant mb-4 uppercase tracking-wider text-xs">Chọn danh mục</h2>
<div class="grid grid-cols-3 gap-4" id="category-selector">
<!-- Categories -->
<button data-cat="1" class="cat-btn flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary bg-primary/5 text-primary transition-all duration-300">
<span class="material-symbols-outlined mb-2 text-3xl" data-icon="book_open">file_open</span>
<span class="text-sm font-semibold">Gia sư</span>
</button>
<button data-cat="2" class="cat-btn flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined mb-2 text-3xl" data-icon="child_care">child_care</span>
<span class="text-sm font-medium">Đón trẻ</span>
</button>
<button data-cat="3" class="cat-btn flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined mb-2 text-3xl" data-icon="cleaning_services">cleaning_services</span>
<span class="text-sm font-medium">Dọn dẹp</span>
</button>
</div>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Title & Description Block -->
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm space-y-6">
<div>
<label class="block text-sm font-bold text-on-surface-variant mb-2 ml-1">Tiêu đề công việc</label>
<input id="task-title" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="VD: Đón bé lớp 3 &amp; kèm Toán" type="text"/>
</div>
<div>
<label class="block text-sm font-bold text-on-surface-variant mb-2 ml-1">Mô tả chi tiết</label>
<textarea id="task-desc" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="Nhập độ tuổi của bé, thời gian học, môn học hoặc yêu cầu đặc biệt khác..." rows="4"></textarea>
</div>
</div>
<!-- Location & Schedule Block -->
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm space-y-6">
<div>
<label class="block text-sm font-bold text-on-surface-variant mb-2 ml-1">Địa điểm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-primary" data-icon="location_on">location_on</span>
<input id="task-loc" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Thêm địa chỉ thực hiện công việc..." type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-bold text-on-surface-variant mb-2 ml-1">Ngày làm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-on-surface-variant/70" data-icon="calendar_today">calendar_today</span>
<input id="task-date" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all text-sm" type="date"/>
</div>
</div>
<div>
<label class="block text-sm font-bold text-on-surface-variant mb-2 ml-1">Giờ bắt đầu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-on-surface-variant/70" data-icon="schedule">schedule</span>
<input id="task-time" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all text-sm" type="time"/>
</div>
</div>
</div>
</div>
<!-- Pricing Block -->
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm">
<div class="flex items-center justify-between mb-4">
<label class="text-sm font-bold text-on-surface-variant ml-1">Mức giá đề xuất</label>
<div class="flex items-center gap-1 bg-tertiary/10 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-tertiary" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-[11px] font-bold text-tertiary uppercase tracking-tight">Giá thị trường</span>
</div>
</div>
<div class="relative">
<span class="absolute right-4 top-3.5 text-on-surface-variant font-bold">VNĐ / buổi</span>
<input id="task-price" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-2xl font-bold text-primary placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="0" type="number"/>
</div>
<p class="mt-3 text-xs text-on-surface-variant/70 ml-1 flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="lightbulb">lightbulb</span>
                    Gợi ý: 150.000đ - 200.000đ/buổi cho khu vực của bạn
                </p>
</div>
<!-- Map Preview (Aesthetic Placeholder) -->
<div class="relative h-40 rounded-2xl overflow-hidden group">
<img class="w-full h-full object-cover grayscale opacity-60 group-hover:grayscale-0 transition-all duration-700" data-alt="abstract minimalist map UI with clean roads and soft pastel colors representing an urban location" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbX9ph3O7Hzi16h5RtLSFp6mKzxZA5YcfMSyG6DXys3kJtI-3dV7ygtSd5bAHUr9uLpyB3qTsZfGEQHPc_KSl6AkKIWNYO6FM6BF0YAJagUdNU4ipJABh1C9EXNdIyg0Jzv7vYCUH3gjxSIiBi2CUvBtw3MP_HwNmSurjo50eH4jWCqp2Sl35dlYKm_muYzGLcsmUpnTfAkm2XKQyvttSJY6mnXOmI9yPgAMpLeAfQj23_TacUuYzn8uEdLebl6xbRBMjaJPMubQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface/80 to-transparent"></div>
<div class="absolute bottom-4 left-4 flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-primary text-sm" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="text-[10px] font-bold text-on-surface uppercase tracking-wider">Xem trên bản đồ</span>
</div>
</div>
</div>
</main>
<!-- Sticky Footer CTA -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-6 pb-8 pt-4 bg-white/90 backdrop-blur-xl border-t border-outline-variant/10">
<button id="submit-btn" class="w-full bg-primary hover:bg-primary-container text-white font-manrope font-extrabold text-base py-4 rounded-xl shadow-[0_20px_40px_rgba(0,83,219,0.15)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            Đăng lên cộng đồng
            <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</footer>
<script>
    const API_BASE = "/api";
    const token = localStorage.getItem('token');
    if (!token) window.location.href = "{% url 'frontend:login' %}";

    let selectedCat = 1;
    const catBtns = document.querySelectorAll('.cat-btn');
    catBtns.forEach(btn => {
        btn.onclick = () => {
            selectedCat = btn.dataset.cat;
            catBtns.forEach(b => {
                b.classList.remove('border-primary', 'bg-primary/5', 'text-primary');
                b.classList.add('border-outline-variant/30', 'bg-surface-container-lowest', 'text-on-surface-variant');
            });
            btn.classList.add('border-primary', 'bg-primary/5', 'text-primary');
            btn.classList.remove('border-outline-variant/30', 'bg-surface-container-lowest', 'text-on-surface-variant');
        };
    });

    document.getElementById('submit-btn').onclick = async () => {
        const title = document.getElementById('task-title').value;
        const description = document.getElementById('task-desc').value;
        const locationStr = document.getElementById('task-loc').value;
        const date = document.getElementById('task-date').value;
        const time = document.getElementById('task-time').value;
        const price = document.getElementById('task-price').value;

        if (!title || !description || !locationStr || !date || !time || !price) {
            alert("Vui lòng điền đầy đủ thông tin!");
            return;
        }

        const scheduled_time = `${date}T${time}:00Z`;

        try {
            const resp = await fetch(API_BASE + "/tasks/", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    category: selectedCat,
                    title, description, location: locationStr,
                    scheduled_time, price
                })
            });
            if (resp.ok) {
                alert("Đăng việc thành công!");
                window.location.href = "{% url 'frontend:parent_tasks' %}";
            } else {
                const err = await resp.json();
                alert("Lỗi: " + JSON.stringify(err));
            }
        } catch (e) { alert("Lỗi kết nối."); }
    };
</script>
</body></html>
