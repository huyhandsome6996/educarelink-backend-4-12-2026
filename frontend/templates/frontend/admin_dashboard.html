<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <title>Educarelink Admin - Quản lý duyệt tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6,
        .page-title, .sidebar-logo, .stat-value, .table-title,
        .edit-modal-title, .empty-title {
            font-family: 'Manrope', sans-serif;
        }

        /* === SIDEBAR === */
        .sidebar {
            position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex; flex-direction: column;
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #334155;
        }
        .sidebar-logo {
            font-size: 20px; font-weight: 900; color: #F26522;
        }
        .sidebar-logo span { color: #94a3b8; font-weight: 500; font-size: 12px; display: block; margin-top: 2px; }
        .sidebar-nav { padding: 16px 12px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 10px;
            cursor: pointer; margin-bottom: 4px;
            font-size: 14px; font-weight: 600; color: #94a3b8;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #334155; color: #e2e8f0; }
        .nav-item.active { background: #F26522; color: #fff; }
        .nav-item .icon { width: 20px; text-align: center; }
        .nav-badge {
            margin-left: auto; background: #ef4444; color: #fff;
            font-size: 10px; font-weight: 800; border-radius: 10px;
            padding: 2px 8px; min-width: 20px; text-align: center;
        }

        /* === MAIN === */
        .main { margin-left: 260px; padding: 32px; min-height: 100vh; }
        .page-header, .stats-row, .table-container {
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px;
        }
        .page-title { font-size: 26px; font-weight: 900; color: #f1f5f9; }
        .page-subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
        .refresh-btn {
            background: #334155; border: 1px solid #475569; color: #e2e8f0;
            padding: 10px 20px; border-radius: 10px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease;
        }
        .refresh-btn:hover { background: #475569; transform: translateY(-1px); }

        /* === STATS === */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 14px;
            padding: 20px; display: flex; align-items: center; gap: 16px;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            box-shadow: 0 4px 12px rgba(242, 101, 34, 0.15);
            border-color: rgba(242, 101, 34, 0.3);
        }
        .stat-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .stat-icon.pending { background: #F26522 + '20'; background: rgba(242,101,34,0.15); color: #F26522; }
        .stat-icon.approved { background: rgba(34,197,94,0.15); color: #22c55e; }
        .stat-icon.total { background: rgba(99,102,241,0.15); color: #6366f1; }
        .stat-value { font-size: 28px; font-weight: 900; color: #f1f5f9; }
        .stat-label { font-size: 12px; color: #64748b; font-weight: 600; margin-top: 2px; }

        /* === TABLE === */
        .table-container {
            background: #1e293b; border: 1px solid #334155; border-radius: 14px;
            overflow: hidden;
        }
        .table-header {
            padding: 16px 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-title { font-size: 15px; font-weight: 800; color: #f1f5f9; }
        .tab-row { display: flex; gap: 8px; }
        .tab {
            padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
            cursor: pointer; border: 1px solid #334155; color: #94a3b8;
            transition: all 0.2s;
        }
        .tab.active { background: #F26522; border-color: #F26522; color: #fff; }
        .tab:hover:not(.active) { background: #334155; }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 12px 20px; font-size: 11px; font-weight: 800;
            color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
        }
        td {
            padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #1e293b;
            vertical-align: middle;
        }
        tr:hover { background: rgba(255,255,255,0.02); }
        .user-cell {
            display: flex; align-items: center; gap: 12px;
        }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 12px;
            overflow: hidden; border: 2px solid #334155; flex-shrink: 0;
        }
        .user-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .user-avatar-placeholder {
            width: 100%; height: 100%; background: #334155;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; font-size: 14px; font-weight: 800;
        }
        .user-name { font-weight: 700; color: #f1f5f9; }
        .user-username { font-size: 12px; color: #64748b; }
        .badge {
            padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
            display: inline-block; transition: all 0.3s ease;
        }
        .badge-pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-approved { background: rgba(34,197,94,0.15); color: #22c55e; }
        .photo-thumbs { display: flex; gap: 6px; }
        .photo-thumb {
            width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
            border: 2px solid #334155; cursor: pointer;
            transition: all 0.2s;
        }
        .photo-thumb:hover { border-color: #F26522; transform: scale(1.1); }
        .action-btns { display: flex; gap: 8px; }
        .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.2s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-approve { background: #22c55e; color: #fff; }
        .btn-approve:hover { background: #16a34a; box-shadow: 0 4px 12px rgba(34,197,94,0.3); }
        .btn-reject { background: #334155; color: #ef4444; border: 1px solid #475569; }
        .btn-reject:hover { background: #ef4444; color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }

        .empty-state {
            padding: 60px 20px; text-align: center;
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-title { font-size: 16px; font-weight: 800; color: #64748b; margin-bottom: 4px; }
        .empty-text { font-size: 13px; color: #475569; }

        /* Modal for viewing photos */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            max-width: 90vw; max-height: 90vh; border-radius: 16px;
            overflow: hidden; position: relative;
        }
        .modal-content img { max-width: 100%; max-height: 85vh; object-fit: contain; }
        .modal-close {
            position: absolute; top: 12px; right: 12px;
            width: 36px; height: 36px; border-radius: 18px;
            background: rgba(0,0,0,0.6); color: #fff; border: none;
            font-size: 18px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }
        .modal-label {
            text-align: center; padding: 12px; color: #94a3b8;
            font-size: 13px; font-weight: 600;
        }

        /* Loading */
        .loading-spinner {
            display: flex; justify-content: center; padding: 60px;
        }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #334155;
            border-top-color: #F26522; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 14px 24px; border-radius: 12px;
            font-size: 14px; font-weight: 700; z-index: 200;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: #22c55e; color: #fff; }
        .toast-error { background: #ef4444; color: #fff; }

        /* Custom Edit Modal */
        .edit-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.85); z-index: 150;
            justify-content: center; align-items: center;
        }
        .edit-modal.show { display: flex; }
        .edit-modal-content {
            background: #1e293b; width: 500px; border-radius: 16px;
            border: 1px solid #334155; overflow: hidden;
        }
        .edit-modal-header {
            padding: 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .edit-modal-title { font-size: 18px; font-weight: 800; color: #f1f5f9; }
        .edit-modal-body { padding: 20px; }
        .edit-modal-photos { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px;}
        .edit-modal-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 2px solid #334155; cursor: pointer; }
        .edit-modal-photo:hover { border-color: #F26522; }
        .edit-modal-textarea {
            width: 100%; height: 100px; background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; padding: 12px; color: #f1f5f9; font-family: inherit;
            resize: vertical; font-size: 14px;
        }
        .edit-modal-footer {
            padding: 16px 20px; border-top: 1px solid #334155; background: #0f172a;
            display: flex; justify-content: flex-end; gap: 12px;
        }
        .edit-modal-btn {
            padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 14px;
            cursor: pointer; border: none;
        }
        .btn-cancel { background: #334155; color: #e2e8f0; }
        .btn-save { background: #F26522; color: #fff; }

        /* === HAMBURGER BUTTON === */
        .hamburger-btn {
            display: none;
            position: fixed; top: 16px; left: 16px; z-index: 60;
            width: 44px; height: 44px; border-radius: 12px;
            background: #1e293b; border: 1px solid #334155;
            color: #e2e8f0; font-size: 20px;
            cursor: pointer; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .hamburger-btn:hover { background: #334155; transform: translateY(-1px); }

        /* === SIDEBAR OVERLAY === */
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 40;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        /* === RESPONSIVE === */
        @media (max-width: 1023px) {
            .hamburger-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding-top: 72px; }
            .page-header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
        @media (max-width: 767px) {
            .stats-row { grid-template-columns: 1fr; }
            .main { padding: 16px; padding-top: 72px; }
            .action-btns { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            .page-title { font-size: 20px; }
            table { font-size: 13px; }
            td, th { padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <!-- Hamburger Button -->
    <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo" style="display:flex;align-items:center;gap:10px;">
                <img src="/static/images/logo.png" alt="EduCareLink" class="h-8 w-8 rounded-lg object-contain">
                Educarelink
                <span>Admin Dashboard</span>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" onclick="switchTab('pending')">
                <span class="icon">⏳</span>
                Chờ duyệt
                <span class="nav-badge" id="pendingBadge">0</span>
            </div>
            <div class="nav-item" onclick="switchTab('all')">
                <span class="icon">👥</span>
                Tất cả Carepartner
            </div>
        </div>
        <div style="padding: 16px 12px; border-top: 1px solid #334155;">
            <div style="font-size: 12px; color: #64748b; margin-bottom: 8px;" id="adminName">Admin</div>
            <div class="nav-item" onclick="logoutAdmin()" style="color: #ef4444;">
                <span class="icon">🚪</span>
                Đăng xuất
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Quản lý Carepartner</h1>
                <p class="page-subtitle">Duyệt đăng ký và quản lý tài khoản sinh viên</p>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 Làm mới</button>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon pending">⏳</div>
                <div>
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">Chờ duyệt</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon approved">✅</div>
                <div>
                    <div class="stat-value" id="statApproved">0</div>
                    <div class="stat-label">Đã duyệt</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon total">👥</div>
                <div>
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">Tổng cộng</div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <span class="table-title" id="tableTitle">Danh sách chờ duyệt</span>
            </div>
            <div id="tableBody">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div class="modal-overlay" id="photoModal" onclick="closeModal()" style="z-index: 200;">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modalImg" src="" alt="Preview" />
            <div class="modal-label" id="modalLabel"></div>
        </div>
    </div>

    <!-- Edit Qualifications Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <div class="edit-modal-header">
                <div class="edit-modal-title" id="editModalTitle">Cập nhật bằng cấp</div>
                <button class="modal-close" style="position:static" onclick="closeEditModal()">✕</button>
            </div>
            <div class="edit-modal-body">
                <div style="font-size:13px; color:#94a3b8; margin-bottom:8px">Ảnh xác minh của ứng viên:</div>
                <div class="edit-modal-photos" id="editModalPhotos"></div>
                <div style="font-size:13px; color:#94a3b8; margin-bottom:8px; margin-top:16px;">Bằng cấp/Chứng chỉ (cách nhau bởi dấu phẩy):</div>
                <textarea class="edit-modal-textarea" id="editModalInput" placeholder="Ví dụ: Đại học Bách Khoa, Chứng chỉ sư phạm"></textarea>
            </div>
            <div class="edit-modal-footer">
                <button class="edit-modal-btn btn-cancel" onclick="closeEditModal()">Huỷ</button>
                <button class="edit-modal-btn btn-save" id="editModalSaveBtn">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== CẤU HÌNH =====
        const API_BASE = '/api';
        let currentTab = 'pending';

        // ===== AUTH: Lấy JWT token từ localStorage =====
        function getAuthToken() {
            return localStorage.getItem('token');
        }

        function authHeaders() {
            const token = getAuthToken();
            if (!token) return {};
            return { 'Authorization': 'Bearer ' + token };
        }

        // ===== apiFetch: Tự động refresh token khi 401 =====
        async function apiFetch(url, options = {}) {
            // Gắn auth headers
            if (!options.headers) options.headers = {};
            const token = getAuthToken();
            if (token) options.headers['Authorization'] = `Bearer ${token}`;
            if (!options.headers['Content-Type'] && !(options.body instanceof FormData)) {
                options.headers['Content-Type'] = 'application/json';
            }

            let response = await fetch(url, options);

            // Nếu 401 → thử refresh token
            if (response.status === 401) {
                const refreshToken = localStorage.getItem('refresh_token');
                if (!refreshToken) {
                    handleAuthError(response);
                    return response;
                }
                try {
                    const refreshRes = await fetch(`${API_BASE}/auth/token/refresh/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    if (refreshRes.ok) {
                        const data = await refreshRes.json();
                        localStorage.setItem('token', data.access);
                        if (data.refresh) localStorage.setItem('refresh_token', data.refresh);
                        // Retry request gốc
                        options.headers['Authorization'] = `Bearer ${data.access}`;
                        response = await fetch(url, options);
                    } else {
                        handleAuthError(response);
                    }
                } catch (e) {
                    handleAuthError(response);
                }
            }
            return response;
        }

        // ===== XSS Prevention: Escape HTML =====
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // Kiểm tra đăng nhập admin
        function checkAdminAuth() {
            const token = getAuthToken();
            if (!token) {
                window.location.href = '/login/?next=/admin-dashboard/';
                return false;
            }
            return true;
        }

        // ===== LOAD DATA =====
        async function loadData() {
            if (!checkAdminAuth()) return;
            try {
                if (currentTab === 'pending') {
                    const res = await apiFetch(`${API_BASE}/admin/pending-workers/`);
                    if (res.status === 401 || res.status === 403) {
                        handleAuthError(res);
                        return;
                    }
                    const pending = await res.json();
                    renderPendingTable(pending);

                    // Stats
                    const allRes = await apiFetch(`${API_BASE}/admin/all-workers/`);
                    if (allRes.status === 401 || allRes.status === 403) {
                        handleAuthError(allRes);
                        return;
                    }
                    const allWorkers = await allRes.json();
                    const approved = allWorkers.filter(w => w.is_approved).length;
                    document.getElementById('statPending').textContent = pending.length;
                    document.getElementById('statApproved').textContent = approved;
                    document.getElementById('statTotal').textContent = allWorkers.length;
                    document.getElementById('pendingBadge').textContent = pending.length;
                } else {
                    const res = await apiFetch(`${API_BASE}/admin/all-workers/`);
                    if (res.status === 401 || res.status === 403) {
                        handleAuthError(res);
                        return;
                    }
                    const allWorkers = await res.json();
                    renderAllTable(allWorkers);

                    const pending = allWorkers.filter(w => !w.is_approved).length;
                    const approved = allWorkers.filter(w => w.is_approved).length;
                    document.getElementById('statPending').textContent = pending;
                    document.getElementById('statApproved').textContent = approved;
                    document.getElementById('statTotal').textContent = allWorkers.length;
                    document.getElementById('pendingBadge').textContent = pending;
                }
            } catch (e) {
                console.error('Error loading data:', e);
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">Không thể kết nối đến server</div>
                        <div class="empty-text">Kiểm tra backend Django có đang chạy không</div>
                    </div>`;
            }
        }

        // ===== XỬ LÝ LỖI AUTH =====
        function handleAuthError(response) {
            if (response.status === 401) {
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔒</div>
                        <div class="empty-title">Phiên đăng nhập hết hạn</div>
                        <div class="empty-text"><a href="/login/?next=/admin-dashboard/" style="color:#F26522;font-weight:700">Đăng nhập lại</a></div>
                    </div>`;
                localStorage.removeItem('token');
            } else if (response.status === 403) {
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🚫</div>
                        <div class="empty-title">Không có quyền truy cập</div>
                        <div class="empty-text">Bạn cần đăng nhập bằng tài khoản Admin để truy cập trang này.<br><a href="/login/?next=/admin-dashboard/" style="color:#F26522;font-weight:700">Đăng nhập bằng tài khoản Admin</a></div>
                    </div>`;
            }
        }

        // ===== RENDER TABLES =====
        function renderPendingTable(workers) {
            if (workers.length === 0) {
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎉</div>

                            ${w.id_card_front ? `<img class="photo-thumb" src="${escapeHtml(w.id_card_front)}" data-action="photo" data-src="${escapeHtml(w.id_card_front)}" data-label="Mặt trước CCCD" title="CCCD trước" />` : ''}
                            ${w.id_card_back ? `<img class="photo-thumb" src="${escapeHtml(w.id_card_back)}" data-action="photo" data-src="${escapeHtml(w.id_card_back)}" data-label="Mặt sau CCCD" title="CCCD sau" />` : ''}
                            ${w.selfie_photo ? `<img class="photo-thumb" src="${escapeHtml(w.selfie_photo)}" data-action="photo" data-src="${escapeHtml(w.selfie_photo)}" data-label="Ảnh chân dung" title="Chân dung" />` : ''}
                            ${w.certificate_photo ? `<img class="photo-thumb" src="${escapeHtml(w.certificate_photo)}" data-action="photo" data-src="${escapeHtml(w.certificate_photo)}" data-label="Bằng cấp/Chứng chỉ" title="Bằng cấp" />` : ''}
                        </div>
                    </td>
                    <td style="font-size:13px;color:#94a3b8">${escapeHtml(w.date_joined)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-approve" data-action="approve" data-id="${w.id}" data-username="${escapeHtml(w.username)}" data-quals="${qualsStr}" data-idfront="${escapeHtml(w.id_card_front||'')}" data-idback="${escapeHtml(w.id_card_back||'')}" data-selfie="${escapeHtml(w.selfie_photo||'')}" data-cert="${escapeHtml(w.certificate_photo||'')}">✅ Duyệt</button>
                            <button class="btn btn-reject" data-action="reject" data-id="${w.id}" data-username="${escapeHtml(w.username)}">✕ Từ chối</button>
                        </div>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('tableBody').innerHTML = html;
            // Attach event listeners using data attributes (XSS-safe)
            attachTableEventListeners();
        }

        function renderAllTable(workers) {
            if (workers.length === 0) {
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">Chưa có Carepartner nào</div>
                        <div class="empty-text">Chờ sinh viên đăng ký nhé</div>
                    </div>`;
                return;
            }

            let html = `<table>
                <thead><tr>
                    <th>Carepartner</th>
                    <th>Liên hệ</th>
                    <th>Trạng thái</th>
                    <th>Ngày đăng ký</th>
                    <th>Ảnh xác minh</th>
                    <th>Thao tác</th>
                </tr></thead><tbody>`;

            workers.forEach(w => {
                const name = `${escapeHtml(w.last_name || '')} ${escapeHtml(w.first_name || '')}`.trim() || escapeHtml(w.username);
                const initial = (w.first_name || w.username || '?')[0].toUpperCase();
                const qualsStr = escapeHtml((w.qualifications || []).join(', '));
                html += `<tr>
                    <td>
                        <div class="user-cell" style="cursor:pointer;" data-action="edit" data-id="${w.id}" data-username="${escapeHtml(w.username)}" data-quals="${qualsStr}" data-idfront="${escapeHtml(w.id_card_front||'')}" data-idback="${escapeHtml(w.id_card_back||'')}" data-selfie="${escapeHtml(w.selfie_photo||'')}" data-cert="${escapeHtml(w.certificate_photo||'')}">
                            <div class="user-avatar">
                                ${w.selfie_photo 
                                    ? `<img src="${escapeHtml(w.selfie_photo)}" alt="${name}" />` 
                                    : `<div class="user-avatar-placeholder">${initial}</div>`}
                            </div>
                            <div>
                                <div class="user-name">${name}</div>
                                <div class="user-username">@${escapeHtml(w.username)}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-size:13px">${escapeHtml(w.email || '—')}</div>
                        <div style="font-size:12px;color:#64748b">${escapeHtml(w.phone_number || '—')}</div>
                    </td>
                    <td>
                        <span class="badge ${w.is_approved ? 'badge-approved' : 'badge-pending'}">
                            ${w.is_approved ? '✅ Đã duyệt' : '⏳ Chờ duyệt'}
                        </span>
                    </td>
                    <td style="font-size:13px;color:#94a3b8">${escapeHtml(w.date_joined)}</td>
                    <td>
                        <div class="photo-thumbs">
                            ${w.id_card_front ? `<img class="photo-thumb" src="${escapeHtml(w.id_card_front)}" data-action="photo" data-src="${escapeHtml(w.id_card_front)}" data-label="CCCD trước" />` : ''}
                            ${w.id_card_back ? `<img class="photo-thumb" src="${escapeHtml(w.id_card_back)}" data-action="photo" data-src="${escapeHtml(w.id_card_back)}" data-label="CCCD sau" />` : ''}
                            ${w.selfie_photo ? `<img class="photo-thumb" src="${escapeHtml(w.selfie_photo)}" data-action="photo" data-src="${escapeHtml(w.selfie_photo)}" data-label="Chân dung" />` : ''}
                            ${w.certificate_photo ? `<img class="photo-thumb" src="${escapeHtml(w.certificate_photo)}" data-action="photo" data-src="${escapeHtml(w.certificate_photo)}" data-label="Bằng cấp" />` : ''}
                        </div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-approve" style="background:#0284c7" data-action="edit" data-id="${w.id}" data-username="${escapeHtml(w.username)}" data-quals="${qualsStr}" data-idfront="${escapeHtml(w.id_card_front||'')}" data-idback="${escapeHtml(w.id_card_back||'')}" data-selfie="${escapeHtml(w.selfie_photo||'')}" data-cert="${escapeHtml(w.certificate_photo||'')}">✏️ Sửa bằng cấp</button>
                        </div>

                </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('tableBody').innerHTML = html;
            // Attach event listeners using data attributes (XSS-safe)
            attachTableEventListeners();
        }

        // ===== EVENT DELEGATION (XSS-safe) =====
        function attachTableEventListeners() {
            document.querySelectorAll('[data-action="edit"]').forEach(el => {
                el.addEventListener('click', function() {
                    openEditModal(
                        parseInt(this.dataset.id),
                        this.dataset.username,
                        this.dataset.quals,
                        this.dataset.idfront,
                        this.dataset.idback,
                        this.dataset.selfie,
                        this.dataset.cert,
                        this.dataset.action === 'edit' && this.textContent.includes('Duyệt')
                    );
                });
            });
            document.querySelectorAll('[data-action="approve"]').forEach(el => {
                el.addEventListener('click', function() {
                    openEditModal(
                        parseInt(this.dataset.id),
                        this.dataset.username,
                        this.dataset.quals,
                        this.dataset.idfront,
                        this.dataset.idback,
                        this.dataset.selfie,
                        this.dataset.cert,
                        true
                    );
                });
            });
            document.querySelectorAll('[data-action="reject"]').forEach(el => {
                el.addEventListener('click', function() {
                    rejectWorker(parseInt(this.dataset.id), this.dataset.username);
                });
            });
            document.querySelectorAll('[data-action="photo"]').forEach(el => {
                el.addEventListener('click', function() {
                    openModal(this.dataset.src, this.dataset.label);
                });
            });
        }
        let editingUserId = null;
        let isApprovingMode = false;

        function openEditModal(userId, username, currentQuals, idFront, idBack, selfie, cert, isApprove = false) {
            editingUserId = userId;
            isApprovingMode = isApprove;
            
            document.getElementById('editModalTitle').textContent = isApprove ? `Duyệt tài khoản @${escapeHtml(username)}` : `Cập nhật bằng cấp @${escapeHtml(username)}`;
            document.getElementById('editModalInput').value = currentQuals;
            document.getElementById('editModalSaveBtn').textContent = isApprove ? '✅ Lưu & Duyệt' : 'Lưu thay đổi';
            
            let photosHtml = '';
            if (idFront) photosHtml += `<img class="edit-modal-photo" src="${escapeHtml(idFront)}" data-action="modal-photo" data-src="${escapeHtml(idFront)}" data-label="CCCD trước" />`;
            if (idBack) photosHtml += `<img class="edit-modal-photo" src="${escapeHtml(idBack)}" data-action="modal-photo" data-src="${escapeHtml(idBack)}" data-label="CCCD sau" />`;
            if (selfie) photosHtml += `<img class="edit-modal-photo" src="${escapeHtml(selfie)}" data-action="modal-photo" data-src="${escapeHtml(selfie)}" data-label="Chân dung" />`;
            if (cert) photosHtml += `<img class="edit-modal-photo" src="${escapeHtml(cert)}" data-action="modal-photo" data-src="${escapeHtml(cert)}" data-label="Bằng cấp" />`;
            
            if (!photosHtml) photosHtml = '<div style="font-size:12px;color:#64748b">Không có ảnh xác minh</div>';
            document.getElementById('editModalPhotos').innerHTML = photosHtml;
            
            // Attach click listeners cho modal photos
            document.querySelectorAll('[data-action="modal-photo"]').forEach(el => {
                el.addEventListener('click', function() {
                    openModal(this.dataset.src, this.dataset.label);
                });
            });
            
            document.getElementById('editModal').classList.add('show');
            
            document.getElementById('editModalSaveBtn').onclick = async function() {
                const val = document.getElementById('editModalInput').value;
                const arr = val.split(',').map(s => s.trim()).filter(s => s !== '');
                
                try {
                    const res = await apiFetch(`${API_BASE}/admin/workers/${editingUserId}/action/`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: isApprovingMode ? 'approve' : 'update_qualifications',
                            qualifications: arr 
                        }),
                    });
                    const data = await res.json();
                    showToast(data.message, 'success');
                    closeEditModal();
                    loadData();
                } catch (e) {
                    showToast('Lỗi khi thực hiện', 'error');
                }
            };
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        async function rejectWorker(userId, username) {
            if (!confirm(`Từ chối tài khoản @${username}? Tài khoản sẽ bị vô hiệu hoá.`)) return;
            try {
                const res = await apiFetch(`${API_BASE}/admin/workers/${userId}/action/`, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'reject' }),
                });
                const data = await res.json();
                showToast(data.message, 'success');
                loadData();
            } catch (e) {
                showToast('Lỗi khi từ chối tài khoản', 'error');
            }
        }

        // ===== SIDEBAR TOGGLE =====
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (tab === 'pending') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                document.getElementById('tableTitle').textContent = 'Danh sách chờ duyệt';
            } else {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                document.getElementById('tableTitle').textContent = 'Tất cả Carepartner';
            }
            document.getElementById('tableBody').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
            loadData();
            // Close sidebar on mobile after tab switch
            if (window.innerWidth < 1024) closeSidebar();
        }

        // ===== MODAL =====
        function openModal(src, label) {
            document.getElementById('modalImg').src = src;
            document.getElementById('modalLabel').textContent = label;
            document.getElementById('photoModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('photoModal').classList.remove('show');
        }

        // ===== LOGOUT =====
        function logoutAdmin() {
            localStorage.removeItem('token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('role');
            window.location.href = '/login/';
        }

        // ===== HIỂN THỊ TÊN ADMIN =====
        function displayAdminName() {
            const username = localStorage.getItem('admin_username') || 'Admin';
            const el = document.getElementById('adminName');
            if (el) el.textContent = '👋 ' + username;
        }

        // ===== TOAST =====
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===== INIT =====
        displayAdminName();
        loadData();
        // Auto-refresh mỗi 30 giây
        setInterval(loadData, 30000);
    </script>

    <!-- Mobile App-like Transition -->
    <style>
        @media (max-width: 767px) {
            body {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
                transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            body.page-loaded {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            body.page-exit {
                opacity: 0;
                transform: translateY(-10px) scale(0.98);
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth <= 767) {
                // Initial load animation
                requestAnimationFrame(() => {
                    document.body.classList.add('page-loaded');
                });

                // Link click transitions
                document.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        const href = link.getAttribute('href');
                        const target = link.getAttribute('target');
                        if (href && href.startsWith('/') && !href.startsWith('#') && target !== '_blank' && !e.ctrlKey && !e.metaKey) {
                            e.preventDefault();
                            document.body.classList.remove('page-loaded');
                            document.body.classList.add('page-exit');
                            setTimeout(() => {
                                window.location.href = href;
                            }, 300); // match transition duration
                        }
                    });
                });
            } else {
                // Ensure visibility on desktop if resized
                document.body.style.opacity = '1';
                document.body.style.transform = 'none';
            }
        });
        
        // Handle back/forward navigation cache
        window.addEventListener('pageshow', (event) => {
            if (event.persisted && window.innerWidth <= 767) {
                document.body.classList.remove('page-exit');
                document.body.classList.add('page-loaded');
            }
        });
    </script>
