<!DOCTYPE html>

<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Educarelink - Chi tiết công việc</title>
  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus_Jakarta_Sans:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "outline": "#6d7a77",
            "inverse-primary": "#b4c5ff",
            "secondary-fixed-dim": "#ffb95a",
            "tertiary-container": "#008376",
            "on-tertiary": "#ffffff",
            "surface-tint": "#0053db",
            "on-secondary-container": "#6f4600",
            "secondary": "#845400",
            "on-surface-variant": "#3d4947",
            "tertiary": "#00685d",
            "surface-bright": "#f8f9fa",
            "on-tertiary-container": "#f4fffb",
            "on-surface": "#191c1d",
            "tertiary-fixed": "#71f8e4",
            "surface-container-highest": "#e1e3e4",
            "surface-container": "#edeeef",
            "on-background": "#191c1d",
            "inverse-surface": "#2e3132",
            "surface-container-low": "#f3f4f5",
            "background": "#f8f9fa",
            "on-primary-fixed": "#00174b",
            "surface-dim": "#d9dadb",
            "on-tertiary-fixed": "#00201c",
            "surface-container-high": "#e7e8e9",
            "secondary-container": "#feb246",
            "on-primary-container": "#fefcff",
            "on-error-container": "#93000a",
            "error": "#ba1a1a",
            "primary-container": "#316bf3",
            "on-secondary-fixed-variant": "#643f00",
            "surface-variant": "#e1e3e4",
            "on-tertiary-fixed-variant": "#005048",
            "primary-fixed": "#dbe1ff",
            "tertiary-fixed-dim": "#4fdbc8",
            "on-primary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "on-primary-fixed-variant": "#003ea8",
            "on-error": "#ffffff",
            "surface": "#f8f9fa",
            "on-secondary-fixed": "#2a1800",
            "primary-fixed-dim": "#b4c5ff",
            "on-secondary": "#ffffff",
            "outline-variant": "#bcc9c6",
            "primary": "#0051d5",
            "inverse-on-surface": "#f0f1f2",
            "secondary-fixed": "#ffddb6",
            "error-container": "#ffdad6"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          }
        },
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .font-headline {
      font-family: 'Manrope', sans-serif;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex justify-center">
  <!-- Mobile Wrapper -->
  <div class="w-full max-w-md bg-background min-h-screen flex flex-col relative pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f8f9fa] dark:bg-[#191c1d]">
  <div class="flex items-center px-4 h-16 w-full max-w-7xl mx-auto justify-between">
    <div class="flex items-center gap-4">
      <button onclick="history.back()"
        class="p-2 rounded-full hover:bg-[#e7e8e9] dark:hover:bg-[#3f4142] transition-colors active:scale-95 duration-150">
        <span class="material-symbols-outlined text-[#0d9488]">arrow_back</span>
      </button>
      <h1 class="font-['Manrope'] text-lg font-bold tracking-tight text-[#191c1d] dark:text-[#e1e3e3]">Chi tiết công việc
      </h1>
    </div>
  </div>
</header>
<!-- Hero Section -->
<section class="px-6 py-8 bg-surface-container-low rounded-b-lg" id="task-hero">
    <div class="animate-pulse">Đang tải...</div>
</section>
<!-- Main Content -->
<main class="flex-grow space-y-8 mt-6">
  <!-- Key Info Section -->
  <section class="px-6 grid grid-cols-2 gap-4" id="task-info">
  </section>
  <!-- Description -->
  <section class="px-6 space-y-4">
    <h3 class="font-headline font-bold text-xl">Yêu cầu chi tiết</h3>
    <div class="bg-surface-container-low/50 p-6 rounded-2xl">
      <div class="prose prose-sm text-on-surface-variant leading-relaxed" id="task-desc">
      </div>
    </div>
  </section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full px-6 py-4 flex justify-between items-center bg-gradient-to-t from-[#f8f9fa] dark:from-[#191c1d] z-50">
  <div class="flex gap-4">
    <button class="text-[#191c1d] dark:text-[#e1e3e3] p-3 rounded-full bg-[#f3f4f5] dark:bg-[#2a2d2e] hover:opacity-90 transition-opacity active:scale-98">
      <span class="material-symbols-outlined">share</span>
    </button>
  </div>
  <button id="apply-btn"
    class="bg-[#0d9488] text-white rounded-full px-12 py-4 font-bold text-lg shadow-[0_-20px_40px_rgba(13,148,136,0.15)] hover:opacity-90 transition-opacity active:scale-98">
    ỨNG TUYỂN NGAY
  </button>
</nav>

<script>
    const API_BASE = "/api";
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('task_id');

    if (!token) window.location.href = "{% url 'frontend:login' %}";
    if (!taskId) window.location.href = "{% url 'frontend:worker_feed' %}";

    async function init() {
        try {
            const resp = await fetch(API_BASE + "/tasks/", { headers: { 'Authorization': 'Bearer ' + token } });
            const tasks = await resp.json();
            const task = tasks.find(t => t.id == taskId);
            if (task) {
                document.getElementById('task-hero').innerHTML = `
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full">Danh mục ${task.category}</span>
                    </div>
                    <h2 class="text-3xl font-headline font-extrabold text-on-surface mb-2 leading-tight">${task.title}</h2>
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-extrabold text-primary">${new Intl.NumberFormat('vi-VN').format(task.price)}đ</span>
                    </div>
                `;
                document.getElementById('task-info').innerHTML = `
                    <div class="p-4 bg-surface-container-lowest rounded-2xl flex flex-col gap-2">
                      <div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-secondary">calendar_today</span>
                      </div>
                      <div>
                        <p class="text-xs text-on-surface-variant">Thời gian</p>
                        <p class="font-bold text-sm">${new Date(task.scheduled_time).toLocaleString('vi-VN')}</p>
                      </div>
                    </div>
                    <div class="p-4 bg-surface-container-lowest rounded-2xl flex flex-col gap-2">
                      <div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-tertiary">location_on</span>
                      </div>
                      <div>
                        <p class="text-xs text-on-surface-variant">Địa điểm</p>
                        <p class="font-bold text-sm">${task.location}</p>
                      </div>
                    </div>
                `;
                document.getElementById('task-desc').innerHTML = `<p>${task.description}</p>`;
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('apply-btn').onclick = async () => {
        if (!confirm("Ứng tuyển việc này?")) return;
        try {
            const r = await fetch(`${API_BASE}/worker/tasks/${taskId}/apply/`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const d = await r.json();
            alert(d.message || d.error);
            if (r.ok) window.location.href = "{% url 'frontend:worker_jobs' %}";
        } catch (e) { alert("Lỗi kết nối."); }
    };

    init();
</script>
</body></html>

</html>
