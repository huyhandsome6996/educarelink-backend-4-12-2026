name: 🔄 Keep Render Awake

on:
  schedule:
    # Chạy mỗi 5 phút — Render sleep sau 15 phút không hoạt động
    - cron: '*/5 * * * *'

  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🏥 Ping Health Endpoint
        run: |
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🎯 Pinging: ${{ vars.RENDER_URL || 'https://educarelink-backend.onrender.com' }}/api/health/"
          echo ""
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 30 \
            -H "User-Agent: EduCareLink-KeepAlive/1.0" \
            "${{ vars.RENDER_URL || 'https://educarelink-backend.onrender.com' }}/api/health/")
          echo "HTTP Status: $HTTP_CODE"
          echo ""
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Server ONLINE"
            cat /tmp/health.json | python3 -m json.tool 2>/dev/null || cat /tmp/health.json
          else
            echo "⚠️ Health endpoint lỗi, thử root URL..."
            ROOT_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              -H "User-Agent: EduCareLink-KeepAlive/1.0" \
              "${{ vars.RENDER_URL || 'https://educarelink-backend.onrender.com' }}/")
            echo "Root URL HTTP: $ROOT_CODE"
            if [ "$ROOT_CODE" -lt 500 ] && [ "$ROOT_CODE" -ge 200 ]; then
              echo "✅ Server ONLINE (via root URL)"
            else
              echo "❌ Server có thể đang ngủ hoặc lỗi"
              exit 1
            fi
          fi

      - name: 🤖 AI Health Check (mỗi 30 phút)
        if: github.event.schedule && (format('{{{{0}}}}', github.run_number) % 6 == 0)
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          RENDER_URL: ${{ vars.RENDER_URL || 'https://educarelink-backend.onrender.com' }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "⏭️ Không có GEMINI_API_KEY — bỏ qua AI check"
            exit 0
          fi

          # Lấy health data
          HEALTH=$(cat /tmp/health.json 2>/dev/null || echo '{}')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          PROMPT="Bạn là AI giám sát EduCareLink. Server vừa ping lúc $TIMESTAMP. Health response: $HEALTH. Hãy đánh giá ngắn gọn (1-2 dòng, tiếng Việt)."

          echo "🤖 Gửi AI health check..."
          AI_RESPONSE=$(curl -s --max-time 15 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}],\"generationConfig\":{\"temperature\":0.3,\"maxOutputTokens\":128}}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('candidates',[{}])[0].get('content',{}).get('parts',[{}])[0].get('text','AI không phản hồi'))" 2>/dev/null \
            || echo "AI check lỗi")

          echo "🤖 AI: $AI_RESPONSE"
